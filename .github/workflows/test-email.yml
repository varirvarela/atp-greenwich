# .github/workflows/test-email.yml
# Manual trigger to test email sending end-to-end.
# Usage:
#   gh workflow run test-email.yml -f type=approval -f email=pablorvarela@gmail.com
#   gh workflow run test-email.yml -f type=reset    -f email=pablorvarela@gmail.com

name: Test Email (manual)

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Email type to test: "approval" or "reset"'
        required: true
        default: 'approval'
      email:
        description: 'Player email address to send the test to'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Seed test approval entry
        if: ${{ github.event.inputs.type == 'approval' }}
        run: EMAIL="${{ github.event.inputs.email }}" node seed-test-approval.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}

      - name: Seed test password-reset entry
        if: ${{ github.event.inputs.type == 'reset' }}
        run: EMAIL="${{ github.event.inputs.email }}" node seed-test-reset.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}

      - name: Send pending emails
        run: node send-email.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}

      - name: Clean up test approval entry
        if: ${{ github.event.inputs.type == 'approval' }}
        run: node cleanup-test-approval.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
