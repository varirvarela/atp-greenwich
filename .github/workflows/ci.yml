name: CI

# Runs on every push to main and on every pull request targeting main.
# Both test suites must pass before code is considered ready to deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write  # needed to commit ci-failures.txt back to the repo on failure

    steps:
      - uses: actions/checkout@v4

      # Firebase RTDB emulator requires Java 21+ (firebase-tools dropped support for older JDKs)
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Cache the Firebase emulator JAR so the first-run download only happens once.
      # Key includes firebase.json so the cache busts when emulator config changes.
      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('firebase.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      # Start the emulator once just long enough for it to download its JAR (if not cached)
      # and verify it can start. The echo exits immediately; the emulator shuts down cleanly.
      - name: Pre-warm Firebase emulator binary
        run: npx firebase emulators:exec --only database --project atp-greenwich "echo Emulator ready"
        timeout-minutes: 5

      # Chromium only — the app targets mobile Chrome
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      # Fast unit tests first — fail early if core logic is broken
      - name: Unit tests (Vitest)
        run: npm test

      # Browser + emulator tests. Output is teed to a file so we can commit it on failure.
      - name: E2E tests (Playwright + Firebase emulator)
        id: e2e
        run: |
          set -o pipefail
          npm run test:e2e 2>&1 | tee /tmp/e2e-output.txt
        continue-on-error: true

      # On failure, write the captured output to ci-failures.txt and commit it to the repo.
      # The [skip ci] tag prevents this commit from triggering another CI run.
      - name: Commit E2E failure log to repo
        if: steps.e2e.outcome == 'failure'
        run: |
          cp /tmp/e2e-output.txt ci-failures.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ci-failures.txt
          git diff --staged --quiet || git commit -m "ci: update E2E failure log [skip ci]"
          git push

      # On failure, also upload the HTML report artifact as before
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: steps.e2e.outcome == 'failure'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # Propagate the E2E failure so the job is marked red
      - name: Fail job if E2E tests failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1
