name: CI

# Runs on every push to main and on every pull request targeting main.
# Both test suites must pass before code is considered ready to deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # Firebase RTDB emulator requires Java
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Cache the Firebase emulator JAR so the first-run download only happens once.
      # Key includes firebase.json so the cache busts when emulator config changes.
      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('firebase.json') }}
          restore-keys: |
            firebase-emulators-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      # Start the emulator once just long enough for it to download its JAR (if not cached)
      # and verify it can start. The echo exits immediately; the emulator shuts down cleanly.
      - name: Pre-warm Firebase emulator binary
        run: npx firebase emulators:exec --only database --project atp-greenwich "echo Emulator ready"
        timeout-minutes: 5

      # Chromium only — the app targets mobile Chrome
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      # Fast unit tests first — fail early if core logic is broken
      - name: Unit tests (Vitest)
        run: npm test

      # Browser + emulator tests — Playwright starts both servers automatically.
      # CI=true makes Playwright always start fresh servers (reuseExistingServer: false).
      # The emulator JAR is now cached so startup is fast.
      - name: E2E tests (Playwright + Firebase emulator)
        run: npm run test:e2e

      # On failure, upload the HTML report so you can inspect what broke
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
