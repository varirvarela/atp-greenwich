# .github/workflows/deploy.yml
# Builds all three apps and deploys to GitHub Pages:
#   /atp-greenwich/           → player app
#   /atp-greenwich/admin/     → admin dashboard
#   /atp-greenwich/companion/ → courtside companion

name: Deploy Player App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build player app
        run: npm run build
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}

      - name: Build admin app
        run: npm run build:admin

      - name: Merge admin into player dist
        run: |
          mkdir -p dist/admin
          cp -r dist-admin/. dist/admin/
          mv dist/admin/admin.html dist/admin/index.html

      - name: Deploy Firebase Database Rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          npx firebase deploy --only database --project atp-greenwich
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
