# .github/workflows/send-email.yml
# Polls Firebase every 5 minutes for approved access requests that need an email.
# Sends via Brevo API, marks emailSent:true to prevent duplicates.
# Phase 5 feature — workflow created now so secrets can be added in advance.

name: Send Approval Emails

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Send pending emails
        run: node send-email.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
