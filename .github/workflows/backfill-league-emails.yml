# .github/workflows/backfill-league-emails.yml
# One-off: seeds league_assignment notifications for all existing members,
# then immediately runs the mailer so emails go out straight away.
# Trigger: Actions tab → Backfill League Emails → Run workflow

name: Backfill League Emails (one-off)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Seed league assignment notifications
        run: node backfill-league-notifications.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}

      - name: Send emails
        run: node send-email.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
