<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ATP Greenwich</title>

  <!-- PWA meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ATP Greenwich">
  <meta name="theme-color" content="#f7f3ec">
  <meta name="description" content="ATP Greenwich — Amateur Tennis and Parrilla">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- PWA manifest -->
  <link rel="manifest" href="/atp-greenwich/manifest.json">
  <link rel="apple-touch-icon" href="/atp-greenwich/images/atp-icon-512.png">
  <link rel="icon" type="image/png" href="/atp-greenwich/images/atp-icon-512.png">

  <style>
    /* Critical above-fold styles — full styles in src/player/style.css */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f7f3ec;
      color: #1c1814;
      font-family: 'Lato', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }
    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    /* Loading state shown before JS hydrates */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      flex-direction: column;
      gap: 16px;
    }
    #loading .logo {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: #b84008;
      letter-spacing: -0.5px;
    }
    #loading .sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8a7e72;
    }
    #loading .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #ddd6c8;
      border-top-color: #b84008;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="logo">ATP</div>
      <div class="sub">Greenwich</div>
      <div class="spinner"></div>
    </div>
  </div>

  <script type="module" src="/src/player/main.js"></script>
</body>
</html>
