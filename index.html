<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ATP Greenwich</title>

  <!-- PWA meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ATP Greenwich">
  <meta name="theme-color" content="#f7f3ec">
  <meta name="description" content="ATP Greenwich — Amateur Tennis and Parrilla">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Inline PWA manifest (no separate file needed) -->
  <link rel="manifest" href="data:application/json;charset=utf-8,{
    %22name%22:%22ATP%20Greenwich%22,
    %22short_name%22:%22ATP%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%23f7f3ec%22,
    %22theme_color%22:%22%23f7f3ec%22,
    %22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23b84008'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🎾%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22}]
  }">

  <style>
    /* Critical above-fold styles — full styles in src/player/style.css */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f7f3ec;
      color: #1c1814;
      font-family: 'Lato', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }
    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    /* Loading state shown before JS hydrates */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      flex-direction: column;
      gap: 16px;
    }
    #loading .logo {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: #b84008;
      letter-spacing: -0.5px;
    }
    #loading .sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8a7e72;
    }
    #loading .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #ddd6c8;
      border-top-color: #b84008;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="logo">ATP</div>
      <div class="sub">Greenwich</div>
      <div class="spinner"></div>
    </div>
  </div>

  <script type="module" src="/src/player/main.js"></script>
</body>
</html>
