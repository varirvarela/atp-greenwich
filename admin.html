<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATP Greenwich — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f7f3ec;
      color: #1c1814;
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
    }
    #app { min-height: 100vh; }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 12px;
    }
    #loading .logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #b84008;
    }
    #loading .sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8a7e72;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <div class="logo">ATP Greenwich</div>
      <div class="sub">Admin · Loading</div>
    </div>
  </div>
  <script type="module" src="/src/admin/main.js"></script>
</body>
</html>
